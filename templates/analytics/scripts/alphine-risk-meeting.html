<div class="min-h-screen bg-background text-foreground">
  <div class="mx-auto max-w-7xl space-y-4 p-4 text-sm">
    <script>
function riskMeetingApp() {
  return {
    view: 'hubspot',
    loading: false,
    loadingStatus: '',
    error: '',
    notice: '',
    statusFilter: 'All',
    csmFilter: 'All',
    pylonCsmFilter: 'All',
    sortDir: 'desc',
    selectedHubspotId: null,
    selectedPylonId: null,
    deals: [],
    pylonOnlyDeals: [],
    meta: {
      title: 'Risk Review',
      description: 'Weekly at-risk account review. Sorted by days in current risk status.',
      author: 'Adam Rochkind',
      updated: 'Apr 7, 2026'
    },
    modelConfig: null,
    statuses: ['All'],
    activeRiskStatuses: [],
    enriching: false,
    lowCountThreshold: 25,
    hostActionTimeoutMs: 28000,
    async init() {
      this.applyRiskModelConfig(this.defaultRiskModelConfig());
      await this.load();
    },
    defaultRiskModelConfig() {
      return {
        dealProperty: 'risk_status',
        dealPropertyValues: ['On the Radar', 'Churn Risk', 'Confirmed Churn', 'No Save Attempted'],
        statusLastUpdatedProperty: 'risk_status_last_updated',
        summaryProperty: 'risk_summary',
        categoryProperty: 'risk_category',
        nextStepProperty: 'hs_next_step',
        notesProperty: 'churn_notes',
        arrProperty: 'total_contract_value',
        ownerProperty: 'customer_success_owner',
        companyRootOrgIdProperty: 'root_org_id',
        companyDomainProperty: 'domain',
        companySegmentProperty: 'account_profile',
        companySegmentValue: 'Enterprise Active Customer',
        excludePastCloseDate: true,
        pylonSentimentField: 'general_sentiment',
        pylonRootOrgIdField: 'account.hubspot.root_org_id',
        pylonDomainField: 'account.hubspot.domain',
        pylonSentimentValues: ['frustrated', 'high_risk_detractor'],
        pylonAccountsEnabled: true,
      };
    },
    dealPropertyName(cfg) {
      const c = cfg || this.modelConfig || this.defaultRiskModelConfig();
      return c.dealProperty || c.statusProperty || 'risk_status';
    },
    applyRiskModelConfig(config) {
      const cfg = config || this.defaultRiskModelConfig();
      this.modelConfig = cfg;
      const values = cfg.dealPropertyValues || cfg.activeStatusValues || [];
      const defaults = this.defaultRiskModelConfig().dealPropertyValues;
      this.activeRiskStatuses = values.length ? values : defaults;
      this.statuses = ['All'].concat(this.activeRiskStatuses);
    },
    fieldValue(row, id) {
      if (!row) return '';
      if (row.fields && row.fields[id] !== undefined && row.fields[id] !== null) return row.fields[id];
      return row[id] ?? '';
    },
    formatFieldValue(value, type) {
      if (type === 'currency') return this.money(value);
      if (type === 'date') return this.date(value);
      if (type === 'days_since') return this.daysLabel(Number(value || 0));
      if (type === 'number') return value ?? '—';
      return value || '—';
    },
    hubspotPropertyList() {
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      const keys = [
        this.dealPropertyName(cfg),
        cfg.statusLastUpdatedProperty,
        cfg.summaryProperty,
        cfg.categoryProperty,
        cfg.nextStepProperty,
        cfg.notesProperty,
        cfg.arrProperty,
        cfg.ownerProperty,
        'dealname',
        'dealstage',
        'closedate',
        'pipeline',
        'hubspot_owner_id',
        'amount',
      ].concat(cfg.hubspotExtraProperties || []);
      return Array.from(new Set(keys.filter(Boolean))).join(',');
    },
    hubspotDealsRiskParams() {
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      return {
        propertyValues: this.activeRiskStatuses,
        dealProperty: this.dealPropertyName(cfg),
        properties: this.hubspotPropertyList(),
      };
    },
    secondaryCohortParams() {
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      return {
        dealProperty: this.dealPropertyName(cfg),
        dealPropertyValues: this.activeRiskStatuses,
        companyRootOrgIdProperty: cfg.companyRootOrgIdProperty,
        companyDomainProperty: cfg.companyDomainProperty,
        companySegmentProperty: cfg.companySegmentProperty,
        companySegmentValue: cfg.companySegmentValue,
        pylonSentimentField: cfg.pylonSentimentField,
        pylonRootOrgIdField: cfg.pylonRootOrgIdField,
        pylonDomainField: cfg.pylonDomainField,
        pylonSentimentValues: cfg.pylonSentimentValues || cfg.pylonRiskSentiments,
        ownerProperty: cfg.ownerProperty,
        arrProperty: cfg.arrProperty,
      };
    },
    withTimeout(promise, ms, label) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error((label || 'Request') + ' timed out')), ms))
      ]);
    },
    prop(deal, key) {
      return deal?.properties?.[key] ?? '';
    },
    money(value) {
      const n = Number(value || 0);
      if (!n) return '—';
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n);
    },
    date(value) {
      if (!value) return '—';
      return new Date(value).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    },
    daysLabel(days) {
      if (days === 0) return 'today';
      if (days === 1) return '1 day';
      return days + 'd';
    },
    statusBadgeClass(status) {
      if (status === 'Confirmed Churn') return 'bg-red-900/50 text-red-300 border border-red-700';
      if (status === 'Churn Risk') return 'bg-orange-900/50 text-orange-300 border border-orange-700';
      if (status === 'On the Radar') return 'bg-yellow-900/50 text-yellow-300 border border-yellow-700';
      return 'bg-gray-800 text-gray-300 border border-gray-600';
    },
    statusDaysClass(status) {
      if (status === 'Confirmed Churn') return 'text-red-400';
      if (status === 'Churn Risk') return 'text-orange-400';
      if (status === 'On the Radar') return 'text-yellow-400';
      return 'text-gray-400';
    },
    listBorderClass(status) {
      if (status === 'Confirmed Churn') return 'border-l-red-500';
      if (status === 'Churn Risk') return 'border-l-orange-500';
      if (status === 'On the Radar') return 'border-l-yellow-500';
      return 'border-l-gray-500';
    },
    sentimentClass(sentiment) {
      if (sentiment === 'positive') return 'bg-emerald-900/50 text-emerald-300 border border-emerald-700';
      if (sentiment === 'frustrated') return 'bg-orange-900/50 text-orange-300 border border-orange-700';
      if (sentiment === 'high_risk_detractor') return 'bg-red-900/50 text-red-300 border border-red-700';
      return 'bg-blue-900/40 text-blue-300 border border-blue-700';
    },
    sentimentLabel(sentiment) {
      if (sentiment === 'high_risk_detractor') return 'High Risk Detractor';
      return String(sentiment || '').split('_').map((p) => p.charAt(0).toUpperCase() + p.slice(1)).join(' ') || '—';
    },
    riskCategories(category) {
      if (!category) return [];
      return String(category).split(';').map((c) => c.trim()).filter(Boolean);
    },
    resolveCsmName(p) {
      if (p.csm_name) return p.csm_name;
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      const ownerKey = cfg.ownerProperty || 'customer_success_owner';
      const csmOwnerId = String(p[ownerKey] || p.customer_success_owner || '');
      if (!csmOwnerId) return null;
      const ownerName = p.owner_name || p.hubspot_owner_name || null;
      if (ownerName && String(p.hubspot_owner_id || '') === csmOwnerId) return ownerName;
      return csmOwnerId;
    },
    toRiskDeal(deal, stageLabels, pipelineLabels) {
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      const p = deal.properties || {};
      const statusKey = this.dealPropertyName(cfg);
      const riskStatus = p[statusKey] || '';
      if (!this.activeRiskStatuses.includes(riskStatus)) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const excludePast = cfg.excludePastCloseDate !== false;
      if (excludePast && p.closedate && new Date(p.closedate) < today) return null;
      const lastUpdatedKey = cfg.statusLastUpdatedProperty || 'risk_status_last_updated';
      const lastUpdatedMs = parseInt(p[lastUpdatedKey] || '0', 10);
      const days = lastUpdatedMs > 0 ? Math.max(0, Math.floor((Date.now() - lastUpdatedMs) / 86400000)) : 0;
      const lastUpdatedIso = lastUpdatedMs > 0 ? new Date(lastUpdatedMs).toISOString().slice(0, 10) : null;
      const arrKey = cfg.arrProperty || 'total_contract_value';
      const arrRaw = p[arrKey] ?? p.amount;
      const fields = {
        dealname: p.dealname || p.deal_name || 'Untitled deal',
        riskStatus,
        riskSummary: p[cfg.summaryProperty] || '',
        riskCategory: p[cfg.categoryProperty] || '',
        nextStep: p[cfg.nextStepProperty] || p.next_step || '',
        churnNotes: p[cfg.notesProperty] || '',
        daysInCurrentRiskStatus: days,
        riskStatusLastUpdated: lastUpdatedIso,
        csmName: p.csm_name || this.resolveCsmName(p),
        dealStageLabel: p.stage_name || stageLabels[p.dealstage] || p.dealstage || null,
        arr: Number(arrRaw || 0) || null,
        closedate: p.closedate || null,
        pipeline: p.pipeline_name || pipelineLabels[p.pipeline] || p.pipeline || null
      };
      return {
        id: deal.id,
        dealname: fields.dealname,
        riskStatus: fields.riskStatus,
        riskSummary: fields.riskSummary,
        riskCategory: fields.riskCategory,
        nextStep: fields.nextStep,
        churnNotes: fields.churnNotes,
        daysInCurrentRiskStatus: fields.daysInCurrentRiskStatus,
        riskStatusLastUpdated: fields.riskStatusLastUpdated,
        csmName: fields.csmName,
        dealStageLabel: fields.dealStageLabel,
        arr: fields.arr,
        closedate: fields.closedate,
        pipeline: fields.pipeline,
        pylonSentiment: null,
        pylonAccountId: null,
        fields
      };
    },
    async loadPylonAccounts() {
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      if (cfg.pylonAccountsEnabled === false) return [];
      try {
        const result = await appAction(
          'build-secondary-cohort',
          this.secondaryCohortParams(),
          { timeoutMs: 360000 }
        );
        return result.accounts || [];
      } catch (err) {
        const msg = err?.message || String(err);
        if (String(this.notice || '').indexOf('Pylon load failed') < 0) {
          this.notice =
            (this.notice ? this.notice + ' ' : '') + 'Pylon load failed: ' + msg;
        }
        return [];
      }
    },
    async loadViaConfiguredActions() {
      this.loadingStatus = 'Loading HubSpot flagged accounts…';
      const hubspotResult = await this.fetchHubspotRiskStatusSearch();
      const hubspotPayload = this.buildHubspotPayload(
        hubspotResult.deals || [],
        hubspotResult.stageLabels || {},
        hubspotResult.pipelineLabels || {}
      );

      this.applyPayload({
        deals: hubspotPayload.deals,
        pylonOnlyDeals: [],
      });
      this.loading = false;

      this.enriching = true;
      this.loadingStatus = 'Loading Pylon early warning (first load can take 1–2 min)…';
      const pylonOnlyDeals = await this.loadPylonAccounts();
      this.pylonOnlyDeals = pylonOnlyDeals;
      this.selectedPylonId = this.filteredPylon()[0]?.pylonAccountId || null;
      this.enriching = false;
      this.loadingStatus = '';

      return {
        deals: hubspotPayload.deals,
        pylonOnlyDeals: pylonOnlyDeals,
        total: hubspotPayload.deals.length + pylonOnlyDeals.length,
      };
    },
    async hubspotRiskStatusSearchSupported() {
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      const probeStatus = this.activeRiskStatuses[0] || 'Churn Risk';
      try {
        const probe = await this.withTimeout(
          appAction('hubspot-deals', {
            propertyValues: [probeStatus],
            dealProperty: this.dealPropertyName(cfg),
            limit: 5,
          }),
          8000,
          'HubSpot risk probe'
        );
        const guidance = String(probe.guidance || '');
        return guidance.indexOf(this.dealPropertyName(cfg)) >= 0 || guidance.indexOf('CRM search') >= 0;
      } catch (probeErr) {
        return false;
      }
    },
    isActionUnavailable(err) {
      const msg = String(err?.message || err || '').toLowerCase();
      return msg.includes('not available') || msg.includes('404') || msg.includes('failed (404');
    },
    mergeDealsById(primary, incoming) {
      const map = new Map();
      for (let i = 0; i < (primary || []).length; i++) map.set(primary[i].id, primary[i]);
      for (let i = 0; i < (incoming || []).length; i++) {
        const deal = incoming[i];
        const existing = map.get(deal.id);
        map.set(deal.id, existing ? Object.assign({}, existing, deal) : deal);
      }
      return Array.from(map.values()).sort(
        (a, b) => b.daysInCurrentRiskStatus - a.daysInCurrentRiskStatus
      );
    },
    async loadViaHubspotRiskDeals() {
      const mergedRaw = [];
      const seen = new Set();
      let stageLabels = {};
      let pipelineLabels = {};
      const addBatch = function (batch, labels) {
        stageLabels = labels.stageLabels || stageLabels;
        pipelineLabels = labels.pipelineLabels || pipelineLabels;
        for (let i = 0; i < batch.length; i++) {
          const deal = batch[i];
          if (!deal || seen.has(deal.id)) continue;
          seen.add(deal.id);
          mergedRaw.push(deal);
        }
      };

      this.loadingStatus = 'Loading HubSpot flagged accounts…';
      const fastResults = await Promise.allSettled([
        this.fetchHubspotDealQuerySearch(),
        this.fetchHubspotRecordSearch(),
      ]);
      for (let i = 0; i < fastResults.length; i++) {
        if (fastResults[i].status === 'fulfilled') {
          addBatch(fastResults[i].value.deals || [], fastResults[i].value);
        }
      }

      if (mergedRaw.length < 35) {
        const riskSearchOk = await this.hubspotRiskStatusSearchSupported();
        if (riskSearchOk) {
          this.loadingStatus = 'Loading HubSpot status cohort…';
          try {
            const riskResult = await this.fetchHubspotRiskStatusSearch();
            addBatch(riskResult.deals || [], riskResult);
          } catch (riskErr) {}
        }
      }

      const payload = this.buildHubspotPayload(mergedRaw, stageLabels, pipelineLabels);
      if (!payload.deals.length) {
        throw new Error('No HubSpot flagged deals found');
      }
      return payload;
    },
    async fetchHubspotRiskStatusSearch() {
      const rawDeals = [];
      let stageLabels = {};
      let pipelineLabels = {};
      let after = null;
      const riskParams = this.hubspotDealsRiskParams();
      for (let page = 0; page < 10; page++) {
        const params = Object.assign(
          { propertyValues: riskParams.propertyValues, dealProperty: riskParams.dealProperty, limit: 100 },
          riskParams.properties ? { properties: riskParams.properties } : {}
        );
        if (after) params.after = after;
        const result = await this.withTimeout(
          appAction('hubspot-deals', params),
          this.hostActionTimeoutMs,
          'HubSpot risk deals'
        );
        stageLabels = result.stageLabels || stageLabels;
        pipelineLabels = result.pipelineLabels || pipelineLabels;
        rawDeals.push.apply(rawDeals, result.deals || []);
        after = result.nextAfter || null;
        if (!after) break;
      }
      return { deals: rawDeals, stageLabels: stageLabels, pipelineLabels: pipelineLabels };
    },
    async fetchHubspotDealQuerySearch() {
      const rawDeals = [];
      const seen = new Set();
      let stageLabels = {};
      let pipelineLabels = {};
      const self = this;

      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      const statusKey = this.dealPropertyName(cfg);

      async function fetchStatus(status) {
        let after = null;
        for (let page = 0; page < 5; page++) {
          const params = { query: status, limit: 100 };
          if (after) params.after = after;
          const result = await self.withTimeout(
            appAction('hubspot-deals', params),
            self.hostActionTimeoutMs,
            'HubSpot deals'
          );
          stageLabels = result.stageLabels || stageLabels;
          pipelineLabels = result.pipelineLabels || pipelineLabels;
          const batch = result.deals || [];
          for (let i = 0; i < batch.length; i++) {
            const deal = batch[i];
            const props = deal.properties || {};
            if ((props[statusKey] || '') !== status) continue;
            if (seen.has(deal.id)) continue;
            seen.add(deal.id);
            rawDeals.push(deal);
          }
          after = result.nextAfter || null;
          if (!after) break;
        }
      }

      for (let s = 0; s < this.activeRiskStatuses.length; s++) {
        await fetchStatus(this.activeRiskStatuses[s]);
      }

      return { deals: rawDeals, stageLabels: stageLabels, pipelineLabels: pipelineLabels };
    },
    async fetchHubspotRecordSearch() {
      const rawDeals = [];
      const seen = new Set();
      let stageLabels = {};
      let pipelineLabels = {};
      const cfg = this.modelConfig || this.defaultRiskModelConfig();
      const statusKey = this.dealPropertyName(cfg);
      try {
        const pipes = await this.withTimeout(
          appAction('hubspot-pipelines', {}),
          this.hostActionTimeoutMs,
          'HubSpot pipelines'
        );
        for (let i = 0; i < (pipes.pipelines || []).length; i++) {
          const pipeline = pipes.pipelines[i];
          pipelineLabels[pipeline.id] = pipeline.label;
          for (let j = 0; j < (pipeline.stages || []).length; j++) {
            stageLabels[pipeline.stages[j].id] = pipeline.stages[j].label;
          }
        }
      } catch (pipeErr) {}

      for (let s = 0; s < this.activeRiskStatuses.length; s++) {
        const status = this.activeRiskStatuses[s];
        let after = null;
        for (let page = 0; page < 5; page++) {
          const params = { objectType: 'deals', query: status, limit: 100 };
          if (after) params.after = after;
          const result = await this.withTimeout(
            appAction('hubspot-records', params),
            this.hostActionTimeoutMs,
            'HubSpot records'
          );
          const records = result.records || [];
          for (let r = 0; r < records.length; r++) {
            const record = records[r];
            if (seen.has(record.id)) continue;
            const props = record.properties || {};
            if ((props[statusKey] || '') !== status) continue;
            seen.add(record.id);
            rawDeals.push({ id: record.id, properties: props });
          }
          after = result.nextAfter || null;
          if (!after) break;
        }
      }
      return { deals: rawDeals, stageLabels: stageLabels, pipelineLabels: pipelineLabels };
    },
    buildHubspotPayload(rawDeals, stageLabels, pipelineLabels) {
      const deals = rawDeals
        .map((deal) => this.toRiskDeal(deal, stageLabels, pipelineLabels))
        .filter(Boolean)
        .sort((a, b) => b.daysInCurrentRiskStatus - a.daysInCurrentRiskStatus);
      return { deals, pylonOnlyDeals: [], total: deals.length };
    },
    applyPayload(data) {
      this.deals = data.deals || [];
      this.pylonOnlyDeals = data.pylonOnlyDeals || [];
      this.selectedHubspotId = this.filteredHubspot()[0]?.id || null;
      this.selectedPylonId = this.filteredPylon()[0]?.pylonAccountId || null;
    },
    hubspotLoadNotice(count) {
      if (count >= this.lowCountThreshold) return '';
      const prop = this.dealPropertyName(this.modelConfig);
      return (
        'Found ' +
        count +
        ' flagged accounts via keyword search. For the full configured cohort, use hubspot-deals with propertyValues and dealProperty=' +
        prop +
        '.'
      );
    },
    async load() {
      this.loading = true;
      this.enriching = false;
      this.loadingStatus = 'Loading risk meeting data…';
      this.error = '';
      this.notice = '';
      try {
        try {
          const data = await this.loadViaConfiguredActions();
          this.pylonOnlyDeals = data.pylonOnlyDeals || [];
          this.selectedPylonId = this.filteredPylon()[0]?.pylonAccountId || null;
          return;
        } catch (primaryErr) {
          if (this.isActionUnavailable(primaryErr)) {
            throw primaryErr;
          }
          this.loadingStatus = 'Loading HubSpot flagged accounts…';
          const hubspotData = await this.loadViaHubspotRiskDeals();
          this.applyPayload(hubspotData);
          const hubspotNotice = this.hubspotLoadNotice(this.deals.length);
          if (hubspotNotice) this.notice = hubspotNotice;
        }
      } catch (err) {
        this.error = err?.message || String(err);
        this.deals = [];
        this.pylonOnlyDeals = [];
      } finally {
        this.loading = false;
        this.enriching = false;
        this.loadingStatus = '';
      }
    },
    hubspotCsms() {
      return Array.from(new Set(this.deals.map((d) => d.csmName).filter(Boolean))).sort();
    },
    pylonCsms() {
      return Array.from(new Set(this.pylonOnlyDeals.map((d) => d.csmName).filter(Boolean))).sort();
    },
    filteredHubspot() {
      return this.deals.filter((d) => {
        if (this.statusFilter !== 'All' && d.riskStatus !== this.statusFilter) return false;
        if (this.csmFilter !== 'All' && d.csmName !== this.csmFilter) return false;
        return true;
      }).sort((a, b) => this.sortDir === 'desc' ? b.daysInCurrentRiskStatus - a.daysInCurrentRiskStatus : a.daysInCurrentRiskStatus - b.daysInCurrentRiskStatus);
    },
    filteredPylon() {
      return this.pylonOnlyDeals.filter((a) => {
        if (this.pylonCsmFilter === '__null__') return !a.csmName;
        if (this.pylonCsmFilter !== 'All' && a.csmName !== this.pylonCsmFilter) return false;
        return true;
      });
    },
    selectedDeal() {
      return this.filteredHubspot().find((d) => d.id === this.selectedHubspotId) || this.filteredHubspot()[0] || null;
    },
    selectedPylon() {
      return this.filteredPylon().find((d) => d.pylonAccountId === this.selectedPylonId) || this.filteredPylon()[0] || null;
    },
    move(delta) {
      if (this.view === 'hubspot') {
        const rows = this.filteredHubspot();
        const idx = Math.max(0, rows.findIndex((d) => d.id === this.selectedHubspotId));
        this.selectedHubspotId = rows[Math.min(Math.max(idx + delta, 0), rows.length - 1)]?.id || null;
      } else {
        const rows = this.filteredPylon();
        const idx = Math.max(0, rows.findIndex((d) => d.pylonAccountId === this.selectedPylonId));
        this.selectedPylonId = rows[Math.min(Math.max(idx + delta, 0), rows.length - 1)]?.pylonAccountId || null;
      }
    },
    handleKey(event) {
      if (event.key === 'ArrowDown') { event.preventDefault(); this.move(1); }
      if (event.key === 'ArrowUp') { event.preventDefault(); this.move(-1); }
    }
  };
}
</script>
<div x-data="riskMeetingApp()" x-init="init()" x-on:keydown.window="handleKey($event)" class="flex min-h-[640px] flex-col gap-4" tabindex="-1">
  <header class="flex flex-wrap items-start justify-between gap-4 border-b border-border pb-4">
    <div class="space-y-1.5">
      <h1 class="text-2xl font-semibold tracking-tight" x-text="meta.title"></h1>
      <p class="max-w-3xl text-sm text-muted-foreground" x-text="meta.description"></p>
      <p class="text-xs text-muted-foreground">
        <span x-text="meta.author"></span>
        <span class="mx-1.5">·</span>
        <span>Updated <span x-text="meta.updated"></span></span>
      </p>
    </div>
    <button type="button" class="inline-flex shrink-0 items-center gap-1.5 rounded-md border border-border bg-background px-3 py-1.5 text-xs hover:bg-muted disabled:opacity-50" x-on:click="load()" :disabled="loading">
      <svg x-show="loading" class="h-3.5 w-3.5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path></svg>
      <span x-text="loading ? 'Refreshing…' : 'Refresh'"></span>
    </button>
  </header>

  <div class="flex flex-col gap-3 border-b border-border pb-4">
    <div class="flex flex-wrap items-center gap-3">
      <div class="flex rounded-lg border border-border bg-muted/30 p-0.5 text-xs">
        <button type="button" class="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 font-medium transition-colors" :class="view === 'hubspot' ? 'border border-border bg-background text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'" x-on:click="view = 'hubspot'; selectedHubspotId = filteredHubspot()[0]?.id || null">
          <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          HubSpot Flagged
          <span class="inline-flex h-4 w-4 items-center justify-center rounded-full text-[10px] font-bold" :class="view === 'hubspot' ? 'bg-foreground text-background' : 'bg-muted text-muted-foreground'" x-text="deals.length"></span>
        </button>
        <button type="button" class="inline-flex items-center gap-1.5 rounded-md px-3 py-1.5 font-medium transition-colors" :class="view === 'pylon' ? 'border border-border bg-background text-foreground shadow-sm' : 'text-muted-foreground hover:text-foreground'" x-on:click="view = 'pylon'; selectedPylonId = filteredPylon()[0]?.pylonAccountId || null">
          <svg class="h-3.5 w-3.5 text-amber-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Pylon Early Warning
          <span class="inline-flex h-4 w-4 items-center justify-center rounded-full text-[10px] font-bold" :class="view === 'pylon' ? 'bg-amber-500 text-white' : 'bg-muted text-muted-foreground'" x-text="pylonOnlyDeals.length"></span>
        </button>
      </div>
    </div>
  </div>

  <p x-show="error" class="rounded-md border border-red-500/30 bg-red-500/10 px-3 py-2 text-xs text-red-400" x-text="error"></p>
  <p x-show="notice && !error" class="rounded-md border border-amber-500/30 bg-amber-500/10 px-3 py-2 text-xs text-amber-300" x-text="notice"></p>
  <p x-show="enriching && !error" class="text-xs text-muted-foreground" x-text="loadingStatus"></p>
  <div x-show="loading && !deals.length && !pylonOnlyDeals.length" class="flex flex-1 flex-col items-center justify-center gap-2 text-sm text-muted-foreground">
    <span x-text="loadingStatus || 'Loading risk accounts…'"></span>
  </div>

  <div x-show="view === 'hubspot' && (!loading || deals.length)" class="flex min-h-0 flex-1 flex-col gap-3">
    <div class="flex flex-wrap items-center gap-3 border-b border-border pb-3 text-xs">
      <span class="font-medium text-muted-foreground">Status:</span>
      <template x-for="status in statuses" :key="status">
        <button type="button" class="rounded-full border px-2.5 py-1 transition-colors" :class="statusFilter === status ? (status === 'All' ? 'border-foreground bg-foreground text-background' : statusBadgeClass(status)) : 'border-border text-muted-foreground hover:bg-muted'" x-on:click="statusFilter = status; selectedHubspotId = filteredHubspot()[0]?.id || null" x-text="status"></button>
      </template>
      <template x-if="hubspotCsms().length">
        <span class="font-medium text-muted-foreground">CSM:</span>
        <select class="rounded-md border border-border bg-background px-2 py-1" x-model="csmFilter" x-on:change="selectedHubspotId = filteredHubspot()[0]?.id || null">
          <option value="All">All CSMs</option>
          <template x-for="csm in hubspotCsms()" :key="csm"><option :value="csm" x-text="csm"></option></template>
        </select>
      </template>
      <span class="ml-auto text-muted-foreground" x-text="filteredHubspot().length + ' account' + (filteredHubspot().length === 1 ? '' : 's')"></span>
    </div>
    <div x-show="!filteredHubspot().length && !loading" class="flex flex-1 items-center justify-center text-sm text-muted-foreground">No at-risk accounts match the current filters.</div>
    <div x-show="filteredHubspot().length" class="grid min-h-[560px] flex-1 gap-4 lg:grid-cols-[340px_minmax(0,1fr)]">
      <div class="flex min-h-0 flex-col">
        <div class="mb-2 flex items-center justify-between px-1 text-xs text-muted-foreground">
          <span>Sorted by Days <span x-text="sortDir === 'desc' ? '↓' : '↑'"></span></span>
          <button type="button" class="rounded-md border border-border px-2 py-0.5 hover:bg-muted" x-on:click="sortDir = sortDir === 'desc' ? 'asc' : 'desc'" x-text="sortDir === 'desc' ? 'Oldest first' : 'Newest first'"></button>
        </div>
        <div class="flex flex-1 flex-col gap-1 overflow-y-auto pr-1">
          <template x-for="deal in filteredHubspot()" :key="deal.id">
            <button type="button" class="w-full rounded-md border-l-4 px-3 py-2.5 text-left transition-colors hover:bg-muted/60" :class="[listBorderClass(deal.riskStatus), selectedHubspotId === deal.id ? 'border border-border bg-muted shadow-sm' : 'border border-transparent']" x-on:click="selectedHubspotId = deal.id">
              <div class="flex items-center justify-between gap-2">
                <span class="truncate text-sm font-medium" x-text="deal.dealname"></span>
                <span class="shrink-0 text-xs font-bold tabular-nums" :class="statusDaysClass(deal.riskStatus)" x-text="daysLabel(deal.daysInCurrentRiskStatus)"></span>
              </div>
              <div class="mt-1 flex flex-wrap items-center gap-1.5">
                <span class="inline-flex items-center rounded-full px-1.5 py-0.5 text-[10px] font-medium" :class="statusBadgeClass(deal.riskStatus)" x-text="deal.riskStatus"></span>
                <span x-show="deal.pylonSentiment" class="inline-flex rounded-full px-1.5 py-0.5 text-[10px] font-medium" :class="sentimentClass(deal.pylonSentiment)" x-text="sentimentLabel(deal.pylonSentiment)"></span>
                <span class="truncate text-xs text-muted-foreground" x-text="deal.csmName || ''"></span>
              </div>
            </button>
          </template>
        </div>
      </div>
      <div class="min-h-0 overflow-hidden rounded-lg border border-border bg-card p-5">
        <template x-if="selectedDeal()">
          <div class="flex h-full flex-col gap-5 overflow-y-auto">
            <div>
              <h2 class="text-2xl font-bold leading-tight tracking-tight" x-text="selectedDeal().dealname"></h2>
              <div class="mt-2 flex flex-wrap items-center gap-2">
                <span class="inline-flex items-center rounded-full px-2.5 py-1 text-sm font-medium" :class="statusBadgeClass(selectedDeal().riskStatus)" x-text="selectedDeal().riskStatus"></span>
                <span class="text-sm font-semibold" :class="statusDaysClass(selectedDeal().riskStatus)" x-text="selectedDeal().daysInCurrentRiskStatus === 0 ? 'Status updated today' : (selectedDeal().daysInCurrentRiskStatus + ' days in current status')"></span>
                <template x-if="selectedDeal().pylonSentiment">
                  <span class="text-sm text-muted-foreground">· Pylon:</span>
                  <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium" :class="sentimentClass(selectedDeal().pylonSentiment)" x-text="sentimentLabel(selectedDeal().pylonSentiment)"></span>
                </template>
              </div>
            </div>
            <section>
              <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Risk Summary</p>
              <div class="min-h-16 rounded-lg border border-border bg-background p-3">
                <p class="whitespace-pre-wrap text-base leading-relaxed" x-text="selectedDeal().riskSummary || 'Not set'"></p>
              </div>
            </section>
            <section>
              <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Next Step</p>
              <div class="min-h-16 rounded-lg border border-border bg-background p-3">
                <p class="whitespace-pre-wrap text-base leading-relaxed" x-text="selectedDeal().nextStep || 'Not set'"></p>
              </div>
            </section>
            <a x-show="selectedDeal().pylonAccountId" :href="'https://app.usepylon.com/accounts/' + selectedDeal().pylonAccountId" target="_blank" rel="noopener noreferrer" class="inline-flex w-fit items-center gap-2 rounded-md border border-indigo-500/50 bg-indigo-500/10 px-3 py-2 text-sm text-indigo-300 hover:border-indigo-400 hover:bg-indigo-500/20">
              <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              View in Pylon
            </a>
            <section x-show="selectedDeal().churnNotes">
              <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Churn Notes</p>
              <div class="min-h-16 rounded-lg border border-border bg-background p-3">
                <p class="whitespace-pre-wrap text-base leading-relaxed" x-text="selectedDeal().churnNotes"></p>
              </div>
            </section>
            <div x-show="selectedDeal().riskCategory">
              <p class="mb-2 text-xs font-semibold uppercase tracking-wider text-muted-foreground">Risk Category</p>
              <div class="flex flex-wrap gap-1.5">
                <template x-for="cat in riskCategories(selectedDeal().riskCategory)" :key="cat">
                  <span class="rounded border border-border bg-muted px-2 py-0.5 text-sm text-muted-foreground" x-text="cat"></span>
                </template>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-x-6 gap-y-2 border-t border-border pt-4 text-sm">
              <p><span class="text-muted-foreground">CSM: </span><span x-text="selectedDeal().csmName || '—'"></span></p>
              <p><span class="text-muted-foreground">ARR: </span><span x-text="money(selectedDeal().arr)"></span></p>
              <p><span class="text-muted-foreground">Stage: </span><span x-text="selectedDeal().dealStageLabel || '—'"></span></p>
              <p><span class="text-muted-foreground">Pipeline: </span><span x-text="selectedDeal().pipeline || '—'"></span></p>
              <p><span class="text-muted-foreground">Close Date: </span><span x-text="date(selectedDeal().closedate)"></span></p>
              <p><span class="text-muted-foreground">Risk Status Since: </span><span x-text="date(selectedDeal().riskStatusLastUpdated)"></span></p>
            </div>
          </div>
        </template>
        <div x-show="!selectedDeal()" class="flex h-full items-center justify-center text-sm text-muted-foreground">Select an account to view details</div>
      </div>
    </div>
  </div>

  <div x-show="view === 'pylon' && (!loading || pylonOnlyDeals.length || notice)" class="flex min-h-0 flex-1 flex-col gap-3">
    <div class="flex flex-wrap items-center gap-2 border-b border-border pb-3 text-xs">
      <span class="font-medium text-muted-foreground">CSM:</span>
      <select class="rounded-md border border-border bg-background px-2 py-1" x-model="pylonCsmFilter" x-on:change="selectedPylonId = filteredPylon()[0]?.pylonAccountId || null">
        <option value="All">All CSMs</option>
        <option value="__null__">Unassigned</option>
        <template x-for="csm in pylonCsms()" :key="csm"><option :value="csm" x-text="csm"></option></template>
      </select>
      <span class="ml-auto text-muted-foreground" x-text="filteredPylon().length + ' account' + (filteredPylon().length === 1 ? '' : 's')"></span>
    </div>
    <div x-show="enriching && view === 'pylon'" class="flex flex-1 items-center justify-center gap-2 text-sm text-muted-foreground">
      <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path></svg>
      <span x-text="loadingStatus || 'Loading Pylon early warning…'"></span>
    </div>
    <div x-show="!filteredPylon().length && !loading && !enriching" class="flex flex-1 items-center justify-center text-sm text-muted-foreground">No Pylon early-warning accounts found.</div>
    <div x-show="filteredPylon().length" class="grid min-h-[560px] flex-1 gap-4 lg:grid-cols-[340px_minmax(0,1fr)]">
      <div class="flex min-h-0 flex-col">
        <div class="mb-2 px-1 text-xs text-muted-foreground">Sorted by close date</div>
        <div class="flex flex-1 flex-col gap-1 overflow-y-auto pr-1">
          <template x-for="account in filteredPylon()" :key="account.pylonAccountId">
            <button type="button" class="w-full rounded-md border-l-4 px-3 py-2.5 text-left transition-colors hover:bg-muted/60" :class="[account.pylonSentiment === 'high_risk_detractor' ? 'border-l-red-500' : 'border-l-orange-500', selectedPylonId === account.pylonAccountId ? 'border border-border bg-muted shadow-sm' : 'border border-transparent']" x-on:click="selectedPylonId = account.pylonAccountId">
              <div class="flex items-center justify-between gap-2">
                <span class="truncate text-sm font-medium" x-text="account.accountName"></span>
                <span class="shrink-0 text-xs tabular-nums text-muted-foreground" x-text="money(account.totalArr)"></span>
              </div>
              <div class="mt-1 flex flex-wrap items-center gap-1.5">
                <span class="inline-flex rounded-full px-1.5 py-0.5 text-[10px] font-medium" :class="sentimentClass(account.pylonSentiment)" x-text="sentimentLabel(account.pylonSentiment)"></span>
                <span class="text-xs text-muted-foreground" x-text="date(account.earliestClosedate)"></span>
                <span x-show="account.dealCount > 1" class="rounded bg-muted px-1.5 py-0.5 text-xs text-muted-foreground" x-text="account.dealCount + ' deals'"></span>
                <span class="truncate text-xs text-muted-foreground" x-text="account.csmName || ''"></span>
              </div>
            </button>
          </template>
        </div>
      </div>
      <div class="min-h-0 overflow-hidden rounded-lg border border-border bg-card p-5">
        <template x-if="selectedPylon()">
          <div class="flex h-full flex-col gap-5 overflow-y-auto">
            <div>
              <h2 class="text-2xl font-bold leading-tight tracking-tight" x-text="selectedPylon().accountName"></h2>
              <div class="mt-2 flex flex-wrap items-center gap-2">
                <span class="text-xs text-muted-foreground">Pylon sentiment:</span>
                <span class="inline-flex rounded-full px-3 py-1 text-sm font-medium" :class="sentimentClass(selectedPylon().pylonSentiment)" x-text="sentimentLabel(selectedPylon().pylonSentiment)"></span>
                <span x-show="selectedPylon().dealCount > 1" class="rounded border border-border bg-muted px-2 py-0.5 text-xs text-muted-foreground" x-text="selectedPylon().dealCount + ' HubSpot deals'"></span>
              </div>
            </div>
            <div class="flex items-start gap-3 rounded-lg border border-amber-600/50 bg-amber-900/20 px-4 py-3">
              <div>
                <p class="text-sm font-semibold text-amber-300">Not yet flagged in HubSpot</p>
                <p class="mt-0.5 text-xs text-amber-400/80">Pylon has detected negative sentiment for this account, but the CSM has not set a risk status in HubSpot.</p>
              </div>
            </div>
            <a :href="'https://app.usepylon.com/accounts/' + selectedPylon().pylonAccountId" target="_blank" rel="noopener noreferrer" class="inline-flex w-fit items-center gap-2 rounded-md border border-indigo-500/50 bg-indigo-500/10 px-3 py-2 text-sm text-indigo-300 hover:border-indigo-400 hover:bg-indigo-500/20">
              <svg class="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              View in Pylon
            </a>
            <div class="grid grid-cols-2 gap-x-6 gap-y-2 border-t border-border pt-4 text-sm">
              <p><span class="text-muted-foreground">CSM: </span><span x-text="selectedPylon().csmName || '—'"></span></p>
              <p><span class="text-muted-foreground">ARR: </span><span x-text="money(selectedPylon().totalArr)"></span></p>
              <p><span class="text-muted-foreground">Earliest Close: </span><span x-text="date(selectedPylon().earliestClosedate)"></span></p>
              <p x-show="selectedPylon().dealCount > 1"><span class="text-muted-foreground">Deals: </span><span x-text="selectedPylon().dealCount"></span></p>
            </div>
          </div>
        </template>
        <div x-show="!selectedPylon()" class="flex h-full items-center justify-center text-sm text-muted-foreground">Select an account to view details</div>
      </div>
    </div>
  </div>
</div>
