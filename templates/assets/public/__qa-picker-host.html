<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Picker Host QA</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      iframe {
        border: 0;
        height: 760px;
        width: 100vw;
      }
    </style>
  </head>
  <body>
    <pre id="messages" hidden>[]</pre>
    <iframe
      id="picker"
      src="/picker?mediaType=image&prompt=QA%20coffee%20cup&aspectRatio=1%3A1&embedded=1&__an_embed_token=signed-token&__an_mcp_chat_bridge=1&embedMode=iframe"
    ></iframe>
    <script>
      window.__messages = [];
      window.addEventListener("message", (event) => {
        const data = event.data || {};
        window.__messages.push({ origin: event.origin, data });
        document.getElementById("messages").textContent = JSON.stringify(
          window.__messages,
        );
        if (
          data.type === "agentNative.mcpHost.updateModelContext" &&
          data.data &&
          data.data.requestId
        ) {
          event.source.postMessage(
            {
              type: "agentNative.mcpHost.response",
              data: { requestId: data.data.requestId, ok: true },
            },
            "*",
          );
        }
        if (data.jsonrpc === "2.0" && data.id) {
          event.source.postMessage(
            {
              jsonrpc: "2.0",
              id: data.id,
              result: {
                protocolVersion: "2026-01-26",
                hostCapabilities: {
                  updateModelContext: true,
                  openLink: true,
                },
                hostContext: { displayMode: "inline" },
              },
            },
            "*",
          );
        }
      });
    </script>
  </body>
</html>
